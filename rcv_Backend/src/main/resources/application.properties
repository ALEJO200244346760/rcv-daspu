# CONFIGURACIÓN DE BASE DE DATOS
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Eliminé la línea del Dialect porque el log decía que no era necesaria

# SEGURIDAD
jwt.secret=${JWT_SECRET:clave_secreta_para_desarrollo_de_ale_123456789}

# SERVIDOR
server.port=${PORT:8080}
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true