spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración de Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ==============================================================
# CONFIGURACIÓN DE SEGURIDAD (JWT)
# ==============================================================
# Usamos la variable JWT_SECRET que configuramos en el panel de Railway
# Si no la encuentra, usa el backup después de los dos puntos
jwt.secret=${JWT_SECRET:clave_secreta_para_desarrollo_de_ale_123456789}

# ==============================================================
# CONFIGURACIÓN DEL SERVIDOR
# ==============================================================
# Railway usa el puerto 8080 por defecto, pero esto asegura compatibilidad
server.port=${PORT:8080}

# Evita problemas con caracteres especiales al leer el archivo
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true